<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prague Travel Guide</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f9f9f9;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .header {
            background-color: #333;
            color: #fff;
            padding: 20px;
            text-align: center;
        }
        .image-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-gap: 10px;
        }
        .image-grid img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }
        .attractions {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .attractions li {
            margin-bottom: 20px;
        }
        .attractions li::before {
            content: "\2022";
            font-size: 20px;
            color: #333;
            margin-right: 10px;
        }
        .map {
            margin-top: 40px;
        }
        @media only screen and (max-width: 768px) {
            .image-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media only screen and (max-width: 480px) {
            .image-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Prague Travel Guide</h1>
        </div>
        <div class="image-grid">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/43/Prague%2C_Czech_Republic_-_panorama_%282018%29.jpg/1280px-Prague%2C_Czech_Republic_-_panorama_%282018%29.jpg" alt="Prague Panorama">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f5/Charles_Bridge%2C_Prague%2C_Czech_Republic.jpg/1280px-Charles_Bridge%2C_Prague%2C_Czech_Republic.jpg" alt="Charles Bridge">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Old_Town_Square_in_Prague.jpg/1280px-Old_Town_Square_in_Prague.jpg" alt="Old Town Square">
        </div>
        <h2>Local Attractions</h2>
        <ul class="attractions">
            <li>Charles Bridge</li>
            <li>Old Town Square</li>
            <li>Prague Castle</li>
            <li>Petrin Tower</li>
            <li>Wenceslas Square</li>
        </ul>
        <div class="map">
            <iframe src="https://www.openstreetmap.org/export/embed.html?bbox=14.3734%2C50.0616%2C14.4764%2C50.1018&layer=mapnik" width="100%" height="400" frameborder="0" scrolling="no"></iframe>
        </div>
    </div>
</body>
</html>
